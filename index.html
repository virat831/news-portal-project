<!DOCTYPE html>
<html>
<head>
  <title>News Portal</title>
  <style>
    body { font-family: Arial; }
    nav { background: black; padding: 10px; }
    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
    }
    section {
      padding: 20px;
      display: none;
    }
  </style>
</head>
<body>

<nav>
  <a href="#" onclick="showSection('technology')">Technology</a>
  <a href="#" onclick="showSection('politics')">Politics</a>
  <a href="#" onclick="showSection('sports')">Sports</a>
  <a href="#" onclick="showSection('business')">Business</a>
  <a href="#" onclick="showSection('entertainment')">Entertainment</a>
</nav>

<section id="technology">
  <h2>Technology News</h2>
  <p>Latest technology news here.</p>
</section>

<section id="politics">
  <h2>Politics News</h2>
  <p>Latest politics news here.</p>
</section>

<section id="sports">
  <h2>Sports News</h2>
  <p>Latest sports news here.</p>
</section>

<section id="business">
  <h2>Business News</h2>
  <p>Latest business news here.</p>
</section>

<section id="entertainment">
  <h2>Entertainment News</h2>
  <p>Latest entertainment news here.</p>
</section>

<script>
function showSection(sectionId) {
  document.querySelectorAll("section").forEach(section => {
    section.style.display = "none";
  });
  document.getElementById(sectionId).style.display = "block";
}
</script>

</body>
</html>
