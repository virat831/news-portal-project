```html
<!DOCTYPE html>
<html>
<head>
<title>Daily News Portal</title>

<style>

body{
font-family: Arial;
background:#f5f7fa;
margin:0;
}

/* NAVBAR */
nav{
background:#112227;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav h2{
color:white;
margin-left:20px;
}

nav div a{
color:white;
margin:15px;
text-decoration:none;
font-weight:bold;
}

nav div a:hover{
color:#3b82f6;
}

/* HERO IMAGE */
.hero{
height:350px;
background:url('https://images.unsplash.com/photo-1504711434969-e33886168f5c');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{
font-size:42px;
background:rgba(0,0,0,0.6);
padding:15px 30px;
border-radius:10px;
}

/* NEWS CONTAINER */
.container{
padding:40px;
display:flex;
gap:25px;
flex-wrap:wrap;
justify-content:center;
}

/* CARD */
.card{
background:white;
width:280px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

footer{
background:#111827;
color:white;
padding:15px;
text-align:center;
margin-top:40px;
}

</style>
</head>

<body>

<nav>
<h2>📰 DailyNews</h2>

<div>
<a href="./index.html">Home</a>
<a href="./technology.html">Technology</a>
<a href="./politics.html">Politics</a>
<a href="./sports.html">Sports</a>
<a href="./business.html">Business</a>
<a href="./entertainment.html">Entertainment</a>
</div>
</nav>

<div class="hero">
<h1>Stay Updated with Latest News</h1>
</div>

<!-- JSON NEWS WILL LOAD HERE -->
<div class="container" id="news-container"></div>

<footer>
DailyNews © 2026 | Professional News Portal
</footer>

<script>

fetch("data.json")
.then(response => response.json())
.then(data => {

let container = document.getElementById("news-container");

data.forEach(news => {

container.innerHTML += `
<div class="card">
<img src="${news.image}">
<div class="card-content">
<h3>${news.title}</h3>
<p>${news.description}</p>
<p><b>${news.category}</b></p>
</div>
</div>
`;

});

})
.catch(error => console.log("Error loading JSON:", error));

</script>

</body>
</html>
```
